version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: cafes-marloy-db
    restart: always
    environment:
      MYSQL_DATABASE: cafes_marloy
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: cafesuser
      MYSQL_PASSWORD: cafespass
    ports:
      - "3307:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql